name: bingen-release

# Publishes the AutoAgent bindings + typed SDKs on a bingen tag:
#   npm  → @autoagent-sdk/native (per-platform napi .node prebuilds)
#        → @autoagent-sdk/sdk    (typed wrapper, depends on @autoagent-sdk/native)
#   PyPI → autoagent-sdk         (the sdk/python mixed wheel: wrapper + _native)
#   JSR  → @layerdynamics/autoagent-native (Deno module)
#        → @layerdynamics/autoagent-sdk    (typed wrapper, depends on @layerdynamics/autoagent-native)
# Native packages publish first; each SDK depends on its published native peer.
on:
  push:
    tags:
      - "bingen-v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  # Gate the whole release on no drift + a fmt/clippy-clean tree.
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo run -p autoagent-bingen --bin bingen -- check
      - run: cargo fmt --all -- --check

  # Build the napi .node prebuild for each platform → upload as artifacts.
  npm-build:
    needs: gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            triple: darwin-arm64
            ext: dylib
          # Intel-mac .node is cross-compiled on the arm64 runner — the macos-13
          # (Intel) runner pool is deprecated/starved and stalls the whole release.
          - os: macos-latest
            target: x86_64-apple-darwin
            triple: darwin-x64
            ext: dylib
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            triple: linux-x64-gnu
            ext: so
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            triple: win32-x64-msvc
            ext: dll
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      # The repo pins channel="1.96.0" via rust-toolchain.toml, so the active
      # toolchain is NOT `stable`. dtolnay's `targets:` added the cross target to
      # `stable`; we must add it to the *pinned* toolchain too. Running from the
      # checkout (default cwd) lets the rust-toolchain.toml override take effect,
      # so this lands on 1.96.0. No-op on native-arch legs.
      - name: Add Rust target for the pinned toolchain
        run: rustup target add ${{ matrix.target }}
      - name: Build napi cdylib
        run: cargo build -p autoagent-bingen --features node-napi --release --lib --target ${{ matrix.target }}
      - name: Rename to platform .node
        shell: bash
        run: |
          mkdir -p crates/autoagent-bingen/dist
          src="target/${{ matrix.target }}/release/$([ "${{ matrix.ext }}" = dll ] && echo '' || echo lib)autoagent_bingen.${{ matrix.ext }}"
          cp "$src" "crates/autoagent-bingen/dist/autoagent.${{ matrix.triple }}.node"
      - uses: actions/upload-artifact@v7
        with:
          name: node-${{ matrix.triple }}
          path: crates/autoagent-bingen/dist/autoagent.${{ matrix.triple }}.node

  npm-publish:
    needs: npm-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - uses: actions/download-artifact@v7
        with:
          path: artifacts
      - name: Assemble dist/
        shell: bash
        run: |
          mkdir -p crates/autoagent-bingen/dist
          find artifacts -name '*.node' -exec cp {} crates/autoagent-bingen/dist/ \;
      - name: Publish to npm
        working-directory: crates/autoagent-bingen
        run: |
          VER=$(node -p "require('./package.json').version")
          if npm view "@autoagent-sdk/native@$VER" version >/dev/null 2>&1; then
            echo "@autoagent-sdk/native@$VER already published — skipping"
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Build + publish the `autoagent-sdk` PyPI package = the sdk/python mixed wheel
  # (pure-Python typed wrapper bundling the pyo3 `_native` extension; the import
  # name stays `autoagent`). The bare native crate's pyproject is local dev/test
  # only; the SDK wheel is the single published `autoagent-sdk` distribution.
  # abi3 → one wheel per platform.
  pypi:
    needs: gate
    strategy:
      fail-fast: false
      matrix:
        # macos-13 (Intel) dropped: the runner pool is deprecated/starved and
        # stalled the release for hours. Intel-mac wheel coverage is a known gap
        # to revisit once the PyPI trusted publisher is configured.
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build the SDK wheel
        working-directory: sdk/python
        run: |
          pip install "maturin>=1.5,<2"
          maturin build --release --out dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist

  # Publish the native Deno module to JSR.
  jsr:
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Publish to JSR
        working-directory: crates/autoagent-bingen
        run: |
          VER=$(deno eval "console.log(JSON.parse(Deno.readTextFileSync('deno.json')).version)")
          if curl -sf "https://jsr.io/@layerdynamics/autoagent-native/${VER}_meta.json" >/dev/null; then
            echo "@layerdynamics/autoagent-native@$VER already published — skipping"
          else
            deno publish --token "${{ secrets.JSR_TOKEN }}"
          fi

  # ---------------------------------------------------------------------------
  # SDK packages — each depends on its native peer being published first, so the
  # workspace `file:`/relative references are rewritten to the published version.
  # ---------------------------------------------------------------------------

  # @autoagent-sdk/sdk on npm, pinned to the just-published @autoagent-sdk/native.
  npm-publish-sdk:
    needs: npm-publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Pin @autoagent-sdk/native, install, build
        working-directory: sdk/node
        run: |
          NATIVE_VER=$(node -p "require('../../crates/autoagent-bingen/package.json').version")
          npm pkg set "dependencies.@autoagent-sdk/native=^$NATIVE_VER"
          npm install
          npm run build
      - name: Publish @autoagent-sdk/sdk
        working-directory: sdk/node
        run: |
          VER=$(node -p "require('./package.json').version")
          if npm view "@autoagent-sdk/sdk@$VER" version >/dev/null 2>&1; then
            echo "@autoagent-sdk/sdk@$VER already published — skipping"
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # @layerdynamics/autoagent-sdk on JSR, native import rewritten to jsr:.
  jsr-sdk:
    needs: jsr
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Point the SDK at the published native module
        working-directory: sdk/deno
        run: |
          NATIVE_VER=$(deno eval "console.log(JSON.parse(Deno.readTextFileSync('../../crates/autoagent-bingen/deno.json')).version)")
          sed -i "s|../../crates/autoagent-bingen/deno/mod.ts|jsr:@layerdynamics/autoagent-native@^$NATIVE_VER|g" mod.ts client.ts errors.ts
      - name: Publish @layerdynamics/autoagent-sdk to JSR
        working-directory: sdk/deno
        run: |
          VER=$(deno eval "console.log(JSON.parse(Deno.readTextFileSync('deno.json')).version)")
          if curl -sf "https://jsr.io/@layerdynamics/autoagent-sdk/${VER}_meta.json" >/dev/null; then
            echo "@layerdynamics/autoagent-sdk@$VER already published — skipping"
          else
            deno publish --allow-dirty --token "${{ secrets.JSR_TOKEN }}"
          fi
