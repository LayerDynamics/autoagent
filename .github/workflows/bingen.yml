name: bingen

on:
  push:
    branches: [main]
    paths:
      - "crates/autoagent-bingen/**"
      - "crates/autoagent-core/**"
      - "sdk/**"
      - ".github/workflows/bingen.yml"
  pull_request:
    paths:
      - "crates/autoagent-bingen/**"
      - "crates/autoagent-core/**"
      - "sdk/**"
      - ".github/workflows/bingen.yml"

env:
  CARGO_TERM_COLOR: always

jobs:
  # Gate: generated files must match a fresh regeneration, fmt + clippy clean.
  gen-gate:
    name: drift · fmt · clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Regenerate and assert no drift
        run: cargo run -p autoagent-bingen --bin bingen -- check
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy (default)
        run: cargo clippy -p autoagent-bingen --all-targets -- -D warnings
      - name: Clippy (each backend)
        run: |
          for f in node-napi py-rustpython deno-ffi deno-bindgen; do
            cargo clippy -p autoagent-bingen --features "$f" --lib -- -D warnings
          done
          RUSTFLAGS="-C link-dead-code" cargo clippy -p autoagent-bingen --features node-bindgen --lib -- -D warnings

  # Rust unit + integration tests (incl. the safety-parity E2E) per OS.
  rust:
    name: rust tests · ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test bingen (default features)
        run: cargo test -p autoagent-bingen
      - name: RustPython backend smoke
        run: cargo test -p autoagent-bingen --features py-rustpython --test rustpython

  # Node backends: napi (primary) + node-bindgen (alternative).
  node:
    name: node backends · ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      - name: napi smoke (build cdylib + load from Node)
        run: cargo run -p autoagent-bingen --bin bingen -- smoke
      - name: napi approval test
        run: node --test crates/autoagent-bingen/__test__/approval.test.mjs
      - name: node-bindgen build + smoke
        shell: bash
        run: |
          RUSTFLAGS="-C link-dead-code" cargo build -p autoagent-bingen --features node-bindgen --release --lib
          node crates/autoagent-bingen/__test__/node_bindgen.smoke.mjs

  # Python: pyo3 (abi3 wheel) primary.
  python:
    name: pyo3 · ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build + test
        shell: bash
        working-directory: crates/autoagent-bingen
        run: |
          # maturin develop needs an active virtualenv; create one (cross-OS).
          python -m venv .venv
          if [ -f .venv/bin/activate ]; then source .venv/bin/activate; else source .venv/Scripts/activate; fi
          pip install "maturin>=1.5,<2" pytest
          maturin develop --features py-pyo3
          pytest tests_py -q

  # Deno backends: deno_bindgen (primary) + raw FFI (alternative).
  deno:
    name: deno backends · ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: ext
        id: ext
        shell: bash
        run: echo "ext=$([ "$RUNNER_OS" = "macOS" ] && echo dylib || echo so)" >> "$GITHUB_OUTPUT"
      - name: deno_bindgen build + codegen + smoke
        shell: bash
        run: |
          cargo build -p autoagent-bingen --features deno-bindgen --release --lib
          META=$(find target/release/build -path '*autoagent-bingen*/out/bindings.json' | head -1)
          deno run -A crates/autoagent-bingen/deno/gen.ts "$META" "../../../target/release"
          export AUTOAGENT_BINGEN_LIB="$PWD/target/release/libautoagent_bingen.${{ steps.ext.outputs.ext }}"
          deno run --allow-ffi --allow-read --allow-write --allow-env crates/autoagent-bingen/deno/smoke_bindgen.ts
      - name: raw FFI build + smoke
        shell: bash
        run: |
          cargo build -p autoagent-bingen --features deno-ffi --release --lib
          export AUTOAGENT_BINGEN_LIB="$PWD/target/release/libautoagent_bingen.${{ steps.ext.outputs.ext }}"
          deno run --allow-ffi --allow-read --allow-write --allow-env crates/autoagent-bingen/deno/smoke.ts

  # ---------------------------------------------------------------------------
  # SDK layer (sdk/python · sdk/node · sdk/deno): build the native binding, then
  # build + test each typed SDK. The generated `sdk/**/_models.*` are drift-
  # guarded by the `gen-gate` job above (they are part of `bingen check`).
  # ---------------------------------------------------------------------------

  # Python SDK: the mixed maturin wheel (pure-Python wrapper + `_native`).
  sdk-python:
    name: sdk · python · ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build native + wrapper, run tests
        shell: bash
        working-directory: sdk/python
        run: |
          # maturin develop needs an active virtualenv; create one (cross-OS).
          python -m venv .venv
          if [ -f .venv/bin/activate ]; then source .venv/bin/activate; else source .venv/Scripts/activate; fi
          pip install "maturin>=1.5,<2" pytest pytest-asyncio
          maturin develop --release
          pytest -q

  # Node SDK: `@autoagent/sdk` over the `@autoagent/native` N-API addon.
  sdk-node:
    name: sdk · node · ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      - name: Build the native @autoagent/native addon (.node)
        shell: bash
        run: |
          cargo build -p autoagent-bingen --features node-napi --release --lib
          case "${{ runner.os }}-${{ runner.arch }}" in
            Linux-X64)     T=linux-x64-gnu;    L=libautoagent_bingen.so ;;
            Linux-ARM64)   T=linux-arm64-gnu;  L=libautoagent_bingen.so ;;
            macOS-X64)     T=darwin-x64;       L=libautoagent_bingen.dylib ;;
            macOS-ARM64)   T=darwin-arm64;     L=libautoagent_bingen.dylib ;;
            Windows-X64)   T=win32-x64-msvc;   L=autoagent_bingen.dll ;;
            Windows-ARM64) T=win32-arm64-msvc; L=autoagent_bingen.dll ;;
            *) echo "unsupported ${{ runner.os }}-${{ runner.arch }}"; exit 1 ;;
          esac
          cp "target/release/$L" "crates/autoagent-bingen/dist/autoagent.$T.node"
      - name: Build + type-check + test the Node SDK
        working-directory: sdk/node
        run: |
          npm install
          npm run build
          npx tsc --noEmit
          npm test

  # Deno SDK: typed module over the native FFI cdylib.
  sdk-deno:
    name: sdk · deno · ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Build native FFI cdylib, type-check + test the Deno SDK
        shell: bash
        working-directory: sdk/deno
        run: |
          ext=$([ "$RUNNER_OS" = "macOS" ] && echo dylib || echo so)
          cargo build -p autoagent-bingen --features deno-ffi --release --lib --manifest-path ../../Cargo.toml
          export AUTOAGENT_BINGEN_LIB="$GITHUB_WORKSPACE/target/release/libautoagent_bingen.$ext"
          deno check mod.ts
          deno test --allow-ffi --allow-read --allow-write --allow-env
